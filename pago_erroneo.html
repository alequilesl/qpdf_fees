<style>

  <title>qPDF | Error en el pago</title>
<base target="_blank">
</head>
<body class="font-body-lg text-body-lg">

<!-- Header (sin botón descargar, solo logo y nombre) -->
<header class="fixed top-0 w-full z-50 bg-background-dark/80 backdrop-blur-md border-b border-outline/20 shadow-none">
<div class="max-w-[448px] mx-auto flex items-center justify-between px-container-padding h-16">
<div class="flex items-center gap-2">
<img class="max-w-[24px]" src="images/qpdf_icon.png" alt="qPDF Logo" onerror="this.style.display='none'">
<span class="text-headline-md font-headline-md font-bold text-primary dark:text-primary-fixed">qPDF</span>
</div>
<div class="w-8"></div>
</div>
</header>

<main class="max-w-[448px] mx-auto pt-16 min-h-screen flex flex-col">

<!-- Pantalla de Pago Erróneo (Fallido) - Solo ícono rojo, título, descripción y botón volver -->
<section class="flex-1 flex flex-col items-center justify-center px-container-padding py-12">
    
    <!-- Contenedor del ícono de error en ROJO -->
    <div class="error-icon-wrapper w-32 h-32 rounded-full flex items-center justify-center mb-6">
        <div class="w-24 h-24 rounded-full bg-red-600/20 flex items-center justify-center animate-pulse">
            <span class="material-symbols-outlined text-red-600 text-6xl" style="font-variation-settings: 'FILL' 1;">cancel</span>
        </div>
    </div>

    <!-- Título -->
    <h1 class="font-display-xl text-display-xl text-white text-center mb-3">
        Error en el Pago
    </h1>

    <!-- Descripción -->
    <p class="text-on-surface-variant text-center mb-10 px-2">
        No pudimos procesar tu transacción. Verifica los datos de tu método de pago e intenta nuevamente.
    </p>

    <!-- Botón Volver al Inicio (único botón, mismo estilo que en éxito) -->
    <a href="#" id="volver-inicio-btn" class="w-full py-4 bg-primary text-on-primary font-label-bold text-label-bold rounded-xl shadow-[0_8px_16px_rgba(192,0,7,0.4)] active:scale-[0.98] transition-all duration-200 text-center">
        Volver al Inicio
    </a>

</section>

<!-- Footer (mismo estilo que landing page con íconos sociales y copyright) -->
<footer class="w-full py-section-gap bg-background-dark border-t border-outline/20">
<div class="max-w-[448px] mx-auto flex flex-col items-center gap-element-gap px-container-padding text-center">

    <!-- Íconos sociales -->
    <ul class="flex justify-center gap-4 list-none m-0 p-0">
        <li>
            <a href="https://www.linkedin.com/in/alequilesl" class="social-icon" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </li>
        <li>
            <a href="https://github.com/alequilesl" class="social-icon" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-github"></i>
            </a>
        </li>
        <li>
            <a href="mailto:quiles.lopez.alejandro@gmail.com" class="social-icon" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-envelope"></i>
            </a>
        </li>
    </ul>

    <!-- Copyright -->
    <ul class="flex justify-center gap-4 text-caption text-on-surface-variant list-none m-0 p-0">
        <li>© qPDF. All rights reserved.</li>
    </ul>
</div>
</footer>

</main>

<script src="config.js"></script>
<script>
    // Micro-interacciones para botones
    const volverBtn = document.getElementById('volver-inicio-btn');
    if (volverBtn) {
        volverBtn.addEventListener('mousedown', () => {
            volverBtn.style.transform = 'scale(0.96)';
        });
        volverBtn.addEventListener('mouseup', () => {
            volverBtn.style.transform = 'scale(1)';
        });
        volverBtn.addEventListener('mouseleave', () => {
            volverBtn.style.transform = 'scale(1)';
        });
        
        // Navegación: Volver al inicio
        volverBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (typeof QPDF_CONFIG !== 'undefined') {
                window.location.href = QPDF_CONFIG.siteUrl;
            } else {
                window.location.href = '/';
            }
        });
    }

    // Animación sutil de entrada para el ícono rojo
    const errorIcon = document.querySelector('.error-icon-wrapper');
    if (errorIcon) {
        errorIcon.style.opacity = '0';
        errorIcon.style.transform = 'scale(0.8)';
        setTimeout(() => {
            errorIcon.style.transition = 'all 0.5s cubic-bezier(0.34, 1.2, 0.64, 1)';
            errorIcon.style.opacity = '1';
            errorIcon.style.transform = 'scale(1)';
        }, 100);
    }
</script>
