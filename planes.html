<style>
        body {

            color: #ffffff;

        }

        }
        .social-icon {

            transform: translateY(-3px);

  <title>qPDF | Planes</title>
<base target="_blank">
</head>
<body class="font-body-lg text-body-lg">

<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-background-dark/80 backdrop-blur-md border-b border-outline/20 shadow-none">
<div class="max-w-[448px] mx-auto flex items-center justify-between px-container-padding h-16">
<div class="flex items-center gap-2">
<img class="max-w-[24px]" src="images/qpdf_icon.png" alt="qPDF Logo" onerror="this.style.display='none'">
<span class="text-headline-md font-headline-md font-bold text-primary dark:text-primary-fixed">qPDF</span>
</div>
<div class="w-8"></div>
</div>
</header>

<main class="max-w-[448px] mx-auto pt-16 min-h-screen flex flex-col">

<!-- Título de la sección -->
<section class="px-container-padding pt-12 pb-4 flex flex-col items-center text-center">
    <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-4">
        <span class="material-symbols-outlined text-primary text-3xl">card_membership</span>
    </div>
    <h1 class="font-display-xl text-display-xl text-white mb-3">
        Planes de Suscripción
    </h1>
    <p class="text-on-surface-variant mb-2 px-4">
        Elige el plan que mejor se adapte a tus necesidades de firma digital.
    </p>
</section>

<!-- Contenedor de planes (se llena desde rates_v2.json) -->
<section id="planes-container" class="px-container-padding py-section-gap flex flex-col gap-element-gap">
    <!-- Los planes se renderizan aquí vía JavaScript -->
</section>

<!-- Botón Volver al Inicio -->
<section class="px-container-padding pb-section-gap">
    <a href="#" id="volver-inicio-btn" class="w-full py-4 bg-transparent border-2 border-primary/20 text-primary font-label-bold text-label-bold rounded-xl hover:bg-primary/5 transition-colors text-center block">
        Volver al Inicio
    </a>
</section>

<!-- Footer -->
<footer class="w-full py-section-gap bg-background-dark border-t border-outline/20">
<div class="max-w-[448px] mx-auto flex flex-col items-center gap-element-gap px-container-padding text-center">
    <ul class="flex justify-center gap-4 list-none m-0 p-0">
        <li>
            <a href="https://www.linkedin.com/in/alequilesl" class="social-icon" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </li>
        <li>
            <a href="https://github.com/alequilesl" class="social-icon" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-github"></i>
            </a>
        </li>
        <li>
            <a href="mailto:quiles.lopez.alejandro@gmail.com" class="social-icon" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-envelope"></i>
            </a>
        </li>
    </ul>
    <ul class="flex justify-center gap-4 text-caption text-on-surface-variant list-none m-0 p-0">
        <li>&copy; qPDF. All rights reserved.</li>
    </ul>
</div>
</footer>

</main>

<script src="config.js"></script>
<script>
    // Cargar y renderizar planes desde rates_v2.json
    fetch('rates_v2.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('planes-container');
            data.rates.forEach((plan, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card plan-card p-6 rounded-xl';
                card.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <div class="bg-primary/10 p-2 rounded-lg">
                            <span class="material-symbols-outlined text-primary">${index === 0 ? 'event' : 'calendar_month'}</span>
                        </div>
                        <div>
                            <h3 class="font-label-bold text-label-bold text-white">${plan.name}</h3>
                            <p class="text-caption text-on-surface-variant">${plan.days} días de vigencia</p>
                        </div>
                    </div>
                    <p class="text-on-surface-variant mb-4 text-sm leading-relaxed">${plan.description}</p>
                    <div class="price-tag rounded-lg p-4 mb-4 flex items-baseline gap-1">
                        <span class="text-3xl font-bold text-white">${plan.price}</span>
                        <span class="text-lg font-label-bold text-primary">${plan.currency}</span>
                    </div>
                    <button class="w-full py-3 bg-primary text-on-primary font-label-bold text-label-bold rounded-xl shadow-[0_8px_16px_rgba(192,0,7,0.4)] active:scale-[0.98] transition-transform">
                        Seleccionar Plan
                    </button>
                `;
                container.appendChild(card);
            });
        })
        .catch(error => {
            console.error('Error cargando planes:', error);
            document.getElementById('planes-container').innerHTML = `
                <div class="glass-card p-6 rounded-xl text-center">
                    <span class="material-symbols-outlined text-error text-4xl mb-2">error</span>
                    <p class="text-on-surface-variant">No se pudieron cargar los planes. Intenta más tarde.</p>
                </div>
            `;
        });

    // Botón volver al inicio usando config.js
    const volverBtn = document.getElementById('volver-inicio-btn');
    if (volverBtn && typeof QPDF_CONFIG !== 'undefined') {
        volverBtn.href = QPDF_CONFIG.siteUrl;
    }

    // Micro-interacciones
    document.querySelectorAll('button').forEach(button => {
        button.addEventListener('mousedown', () => {
            button.style.transform = 'scale(0.96)';
        });
        button.addEventListener('mouseup', () => {
            button.style.transform = 'scale(1)';
        });
        button.addEventListener('mouseleave', () => {
            button.style.transform = 'scale(1)';
        });
    });
</script>

</body>
</html>
